<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zoocutz s=JSON.parse(localStorage.getItem("moonCfg")||"{}");if(s.shopName)document.title=s.shopName+" — Book";} catch(e){}</script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:     #090909;
  --s1:     #111;
  --s2:     #181818;
  --border: #222;
  --text:   #f0ebe2;
  --dim:    #444;
  --dim2:   #333;
  --cream:  #e2d9c8;
  --cut:    #e8e0d0;  /* highlight */
  --red:    #b03030;  /* subtle */
  --gold:   #c4a97d;
  --font-display: 'Barlow Condensed', sans-serif;
}

html{font-size:16px;height:100%;background:var(--bg)}
body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden;-webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* grain */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");pointer-events:none;z-index:9000}

.app{height:100dvh;height:-webkit-fill-available;display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden}

/* ── HEADER ────────────────────────── */
header{
  flex-shrink:0;
  display:grid;
  grid-template-columns:1fr auto;
  grid-template-rows:auto auto;
  padding:10px 16px 0;
  border-bottom:1px solid var(--border);
  gap:0;
  background:var(--bg);
  position:relative;
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:2.4rem;
  letter-spacing:0.18em;
  line-height:0.85;
  grid-column:1;grid-row:1;
  color:var(--cut);
}

.tagline{
  font-size:0.42rem;
  letter-spacing:0.38em;
  color:var(--dim);
  text-transform:uppercase;
  grid-column:1;grid-row:2;
  padding:4px 0 10px;
}

.hdr-right{
  grid-column:2;grid-row:1/3;
  display:flex;flex-direction:column;
  align-items:flex-end;justify-content:center;
  gap:4px;padding-bottom:14px;
}
.hdr-date{font-size:0.44rem;letter-spacing:0.18em;color:var(--dim);text-transform:uppercase}

/* red accent line — subtle nod to the pole without being corny */
.hdr-accent{
  position:absolute;
  left:0;bottom:0;
  width:3px;height:100%;
  background:var(--red);
  opacity:0.7;
}

/* ── STEP STRIP ────────────────────── */
.step-strip{
  flex-shrink:0;
  display:flex;
  padding:0;
  border-bottom:1px solid var(--border);
}
.stp{
  flex:1;padding:8px 4px;text-align:center;
  font-size:0.6rem;letter-spacing:0.18em;color:var(--dim);
  text-transform:uppercase;border-right:1px solid var(--border);
  transition:color 0.3s;position:relative;
}
.stp:last-child{border-right:none}
.stp.active{color:var(--cream)}
.stp.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--cream);animation:stpIn 0.3s ease}
@keyframes stpIn{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.stp.done{color:var(--dim)}
.stp.done .stp-num{color:var(--gold)}
.stp-num{font-size:0.5rem;display:block;margin-bottom:2px;color:var(--dim2);letter-spacing:0.14em}

/* ── SLIDES ─────────────────────────── */
.slides{flex:1;overflow:hidden;position:relative;min-height:0}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:16px 16px 0;
  opacity:0;pointer-events:none;
  transform:translateX(32px);
  transition:opacity 0.22s cubic-bezier(0.4,0,0.2,1),transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94);
  overflow:hidden;
}
.slide::after{display:none}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.exit{opacity:0;transform:translateX(-24px)}

/* heading */
.sh{
  font-family:var(--font-display);
  font-weight:700;
  font-size:clamp(1.8rem,8vw,2.8rem);
  text-transform:uppercase;
  line-height:0.9;
  letter-spacing:-0.01em;
  margin-bottom:14px;
  color:var(--cut);
  flex-shrink:0;
}
.sh em{font-style:italic;color:var(--gold);font-weight:700}
.sh .small{font-size:0.45em;letter-spacing:0.25em;display:block;color:var(--dim);font-weight:300;margin-bottom:4px;font-family:'DM Mono',monospace}

/* ── SERVICE LIST ───────────────────── */
.svc-wrap{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:16px}
.svc-wrap::-webkit-scrollbar{display:none}
.svc-list{display:flex;flex-direction:column;gap:1px;border:1px solid var(--border);border-radius:6px;overflow:hidden}

.svc-row{
  display:flex;align-items:center;
  background:var(--s1);
  padding:16px 18px;
  cursor:pointer;
  transition:background 0.15s;
  position:relative;
  -webkit-user-select:none;user-select:none;
  border-bottom:1px solid var(--border);
  gap:0;
}
.svc-row:last-child{border-bottom:none}
.svc-row:active{background:var(--s2)}
.svc-row.sel{background:rgba(196,169,125,0.06);transform:translateX(2px)}

/* left bar */
.svc-row::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--gold);
  transform:scaleY(0);
  transition:transform 0.2s cubic-bezier(0.34,1.3,0.64,1);
}
.svc-row.sel::before{transform:scaleY(1)}

.svc-left{flex:1}
.svc-name{
  font-family:var(--font-display);
  font-weight:700;
  font-size:1.4rem;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:var(--cut);
  line-height:1;
  margin-bottom:3px;
}
.svc-sub{font-size:0.5rem;letter-spacing:0.1em;color:var(--dim)}

.svc-right{display:flex;align-items:center;gap:14px}
.svc-price{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;
  letter-spacing:0.06em;
  color:var(--gold);
  line-height:1;
}
.svc-radio{
  width:16px;height:16px;
  border-radius:50%;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink:0;
}
.svc-radio-inner{width:8px;height:8px;border-radius:50%;background:var(--gold);transform:scale(0);transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1)}
.svc-row.sel .svc-radio{border-color:var(--gold)}
.svc-row.sel .svc-radio-inner{transform:scale(1)}

/* ── DATE ───────────────────────────── */
.sec-label{
  font-size:0.44rem;letter-spacing:0.28em;color:var(--dim);
  text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

.date-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.date-strip::-webkit-scrollbar{display:none}
.dc{scroll-snap-align:start}

.dc{
  flex-shrink:0;
  background:var(--s1);border:1px solid var(--border);
  border-radius:4px;padding:9px 9px 8px;
  cursor:pointer;text-align:center;min-width:46px;
  transition:all 0.18s cubic-bezier(0.34,1.4,0.64,1);
  -webkit-user-select:none;user-select:none;
}
.dc:active{transform:scale(0.91)}
.dc.sel{background:var(--cut);border-color:var(--cut)}
.dc.sel .dc-d,.dc.sel .dc-n{color:var(--bg)}
.dc-d{font-size:0.38rem;letter-spacing:0.18em;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:4px}
.dc-n{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;line-height:1;display:block;color:var(--text)}

/* ── TIME ───────────────────────────── */
.t-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.tc{
  background:var(--s1);border:1px solid var(--border);
  border-radius:4px;padding:14px 4px;
  font-size:13px;letter-spacing:0.04em;text-align:center;
  cursor:pointer;color:var(--text);
  transition:all 0.15s cubic-bezier(0.34,1.4,0.64,1);
  -webkit-user-select:none;user-select:none;
}
.tc:active:not(.taken){transform:scale(0.93)}
.tc.sel{background:var(--cut);border-color:var(--cut);color:var(--bg);transform:scale(1.05);font-weight:600;letter-spacing:0.08em}
.tc.taken{opacity:0.12;cursor:not-allowed;text-decoration:line-through}

/* ── INFO ───────────────────────────── */
.fg{margin-bottom:12px}
.fl{font-size:0.44rem;letter-spacing:0.28em;color:var(--dim);text-transform:uppercase;margin-bottom:7px;display:block}
.fi{
  width:100%;background:var(--s1);border:1px solid var(--border);
  border-radius:4px;color:var(--cut);
  font-family:var(--font-display);font-weight:600;
  font-size:1.5rem;letter-spacing:0.06em;
  padding:13px 16px;outline:none;
  transition:border-color 0.2s;-webkit-appearance:none;
  text-transform:uppercase;
}
.fi::placeholder{font-family:'DM Mono',monospace;font-size:0.85rem;font-weight:300;letter-spacing:0.06em;color:var(--dim2);text-transform:none}
.fi:focus{border-color:var(--gold)}

.info-note{
  margin-top:14px;
  font-size:0.52rem;letter-spacing:0.1em;color:var(--dim);
  line-height:2;padding:12px 14px;
  border-left:2px solid var(--border);
}
.info-note strong{color:var(--cream);font-weight:400}

/* ── CONFIRM ────────────────────────── */
.cfm-banner{
  border:1px solid var(--border);
  border-radius:4px 4px 0 0;
  border-bottom:none;
  padding:16px 18px;
  background:var(--s1);
  position:relative;overflow:hidden;
}
/* thin red stripe — barbershop without being cheesy */
.cfm-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent)}

.cfm-svc-name{
  font-family:var(--font-display);font-weight:700;
  font-size:2.6rem;text-transform:uppercase;letter-spacing:0.02em;
  line-height:0.9;color:var(--cut);margin-bottom:5px;
}
.cfm-svc-meta{font-size:0.58rem;letter-spacing:0.12em;color:var(--gold)}

.cfm-cells{
  display:grid;grid-template-columns:1fr 1fr;
  border:1px solid var(--border);border-radius:0 0 4px 4px;
  overflow:hidden;margin-bottom:10px;
}
.cfm-cell{
  padding:12px 14px;
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:var(--s1);
}
.cfm-cell:nth-child(even){border-right:none}
.cfm-cell:nth-last-child(-n+2){border-bottom:none}
.cfm-cell-l{font-size:0.4rem;letter-spacing:0.22em;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.cfm-cell-v{font-family:var(--font-display);font-weight:600;font-size:1.1rem;letter-spacing:0.04em;text-transform:uppercase;color:var(--cut);line-height:1.2}


/* ── FOOTER ─────────────────────────── */
footer{flex-shrink:0;background:var(--bg);padding:8px 16px env(safe-area-inset-bottom, 16px);border-top:1px solid var(--border)}
.fs{font-size:0.5rem;letter-spacing:0.1em;color:var(--dim);text-align:center;margin-bottom:9px;min-height:14px;transition:color 0.3s}
.fs.on{color:var(--cream)}
.fb{display:flex;gap:8px}
.bbk{width:46px;background:var(--s1);border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;-webkit-user-select:none;user-select:none}
.bbk:active{transform:scale(0.95)}
.bbk.hidden{display:none}
.bnx{
  flex:1;background:var(--cut);color:var(--bg);
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;letter-spacing:0.2em;
  border:none;border-radius:4px;padding:15px;
  cursor:pointer;transition:all 0.18s cubic-bezier(0.34,1.2,0.64,1);
  -webkit-user-select:none;user-select:none;
}
.bnx:not(:disabled):active{transform:scale(0.97)}
.bnx:disabled{background:var(--s2);color:var(--dim);cursor:not-allowed}
.bnx .bt{position:relative;z-index:1}
.bnx .sp{display:none;width:18px;height:18px;border:2px solid rgba(0,0,0,0.15);border-top-color:var(--bg);border-radius:50%;animation:spin 0.5s linear infinite;margin:0 auto}
.bnx.loading .bt{display:none}
.bnx.loading .sp{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SUCCESS ────────────────────────── */
.succ{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.4s}
.succ.show{opacity:1;pointer-events:all}

.succ-mark{
  width:64px;height:64px;border-radius:50%;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  transform:scale(0);opacity:0;
  transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s;
  color:var(--gold);font-size:1.6rem;
  font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em;
}
.succ.show .succ-mark{transform:scale(1);opacity:1}

.succ-title{font-family:var(--font-display);font-weight:700;font-size:3.4rem;text-transform:uppercase;letter-spacing:0.02em;line-height:0.9;color:var(--cut);margin-bottom:6px;transform:translateY(14px);opacity:0;transition:all 0.4s ease 0.4s}
.succ.show .succ-title{transform:translateY(0);opacity:1}
.succ-sub{font-size:0.58rem;letter-spacing:0.16em;color:var(--dim);text-transform:uppercase;margin-bottom:28px;transform:translateY(14px);opacity:0;transition:all 0.4s ease 0.5s}
.succ.show .succ-sub{transform:translateY(0);opacity:1}

.succ-card{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:16px 18px;width:100%;text-align:left;margin-bottom:12px;transform:translateY(14px);opacity:0;transition:all 0.4s ease 0.55s}
.succ.show .succ-card{transform:translateY(0);opacity:1}
.sr{display:flex;justify-content:space-between;align-items:center;font-size:0.6rem;letter-spacing:0.08em;padding:7px 0;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sr .k{color:var(--dim)}.sr .v{color:var(--cut)}

/* date strip — show scroll indicator */
.date-strip-wrap{position:relative;flex-shrink:0}
.date-strip-wrap::after{
  content:'';
  position:absolute;right:0;top:0;bottom:6px;
  width:24px;
  background:linear-gradient(to right,transparent,var(--bg));
  pointer-events:none;
}

/* time grid — make it scrollable within slide without breaking layout */
.t-grid-wrap{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0;scrollbar-width:none;padding-right:2px}
.t-grid-wrap::-webkit-scrollbar{display:none}
.t-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

/* ── LOCK BTN ── */
.lock-btn{background:none;border:none;cursor:pointer;color:var(--dim2);font-size:0.75rem;padding:2px 4px;transition:color 0.2s;flex-shrink:0;line-height:1;-webkit-user-select:none;user-select:none}
.lock-btn:hover{color:var(--dim)}

/* ── QUICK TEXT BUTTON ── */
.quick-text-btn{display:none;align-items:center;gap:6px;background:rgba(196,169,125,0.08);border:1px solid rgba(196,169,125,0.2);border-radius:3px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);text-decoration:none;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.quick-text-btn.on{display:flex}
.quick-text-btn:hover{background:rgba(196,169,125,0.14)}

/* ── ABOUT STRIP ── */
.about-strip{background:var(--s1);border-bottom:1px solid var(--border);padding:12px 16px;display:none}
.about-strip.on{display:block}
.about-text{font-size:11px;letter-spacing:0.06em;color:var(--dim);line-height:1.7}
.about-insta{display:inline-flex;align-items:center;gap:5px;font-size:11px;letter-spacing:0.08em;color:var(--gold);text-decoration:none;margin-top:4px}

/* ── GALLERY STRIP ── */
.gallery-strip{display:none;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border)}
.gallery-strip.on{display:flex}
.gallery-strip::-webkit-scrollbar{display:none}
.gallery-img{width:72px;height:72px;border-radius:4px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);cursor:pointer;transition:opacity 0.2s}
.gallery-img:hover{opacity:0.8}

/* ── WALK-IN BAR ── */
.walkin-bar{display:none;flex-shrink:0;background:rgba(196,169,125,0.06);border-bottom:1px solid rgba(196,169,125,0.2);padding:8px 16px;align-items:center;justify-content:space-between;gap:10px}
.walkin-bar.on{display:flex}
.walkin-label{font-size:11px;letter-spacing:0.1em;color:var(--dim)}
.walkin-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;background:var(--gold);color:var(--bg);border:none;border-radius:3px;padding:6px 14px;cursor:pointer;text-decoration:none;white-space:nowrap}

/* ── VACATION SCREEN ── */
.vaca-screen{position:fixed;inset:0;background:var(--bg);z-index:5000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
.vaca-screen.on{display:flex}
.vaca-icon{font-size:3rem;margin-bottom:16px}
.vaca-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2.8rem;letter-spacing:0.04em;text-transform:uppercase;color:var(--cut);margin-bottom:8px;line-height:1}
.vaca-msg{font-size:13px;letter-spacing:0.08em;color:var(--dim);line-height:1.8}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:8000;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:6px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:20px;font-size:1.6rem;color:var(--dim);cursor:pointer;background:none;border:none}

/* ── PAY OPTIONS ── */
.pay-section{margin-top:10px}
.pay-label{font-size:0.44rem;letter-spacing:0.28em;color:var(--dim);text-transform:uppercase;margin-bottom:8px;display:block}
.pay-options{display:flex;flex-direction:column;gap:7px}
.pay-opt{display:flex;align-items:center;gap:14px;background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:13px 16px;cursor:pointer;transition:all 0.18s;-webkit-user-select:none;user-select:none;position:relative}
.pay-opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:4px 0 0 4px;transform:scaleY(0);transition:transform 0.2s cubic-bezier(0.34,1.3,0.64,1)}
.pay-opt:active{transform:scale(0.98)}
.pay-opt.sel{background:rgba(196,169,125,0.05);border-color:var(--gold)}
.pay-opt.sel::before{transform:scaleY(1);background:var(--gold)}
.pay-opt-cash::before{background:var(--gold)}
.pay-opt-cashapp::before{background:#00d632}
.pay-opt-venmo::before{background:#3d95ce}
.pay-opt-paypal::before{background:#0070ba}
.pay-opt.sel.pay-opt-cashapp{border-color:#00d632}
.pay-opt.sel.pay-opt-venmo{border-color:#3d95ce}
.pay-opt.sel.pay-opt-paypal{border-color:#0070ba}
.pay-icon{font-size:1.3rem;flex-shrink:0;width:28px;text-align:center}
.pay-info{flex:1}
.pay-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--cut);line-height:1;margin-bottom:2px}
.pay-desc{font-size:0.5rem;letter-spacing:0.08em;color:var(--dim)}
.pay-radio{width:16px;height:16px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1)}
.pay-radio-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);transform:scale(0);transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1)}
.pay-opt.sel .pay-radio{border-color:var(--gold)}
.pay-opt.sel .pay-radio-dot{transform:scale(1)}

/* ── BAGAIN BUTTON ── */
.bagain{font-family:'DM Mono',monospace;font-size:0.56rem;letter-spacing:0.15em;color:var(--dim);background:none;border:1px solid var(--border);border-radius:4px;padding:12px 26px;cursor:pointer;text-transform:uppercase;transform:translateY(14px);opacity:0;transition:all 0.4s ease 0.75s,border-color 0.2s,color 0.2s}
.succ.show .bagain{transform:translateY(0);opacity:1}
.bagain:hover{border-color:var(--dim);color:var(--cream)}
.succ.show #cashReminder{transform:translateY(0);opacity:1}

/* ── ADD-ONS ────────────────────────── */
.addon-skip-note{font-size:0.48rem;letter-spacing:0.1em;color:var(--dim);margin-bottom:12px;line-height:1.8;padding:0 2px}
.addon-check{
  width:16px;height:16px;border-radius:3px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink:0;font-size:10px;color:transparent;background:transparent;
}
.svc-row.addon-sel .addon-check{border-color:var(--gold);background:var(--gold);color:var(--bg)}
.svc-row.addon-sel{background:rgba(196,169,125,0.06);transform:translateX(2px)}
.svc-row.addon-sel::before{transform:scaleY(1)}
.addon-none{font-size:0.52rem;letter-spacing:0.1em;color:var(--dim);text-align:center;padding:24px 0;font-style:italic}

/* ── SWAGGER FINISHES ───────────────── */

/* 1. App entrance */
@keyframes appDrop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.app{animation:appDrop 0.5s cubic-bezier(0.22,1,0.36,1) both}

/* 2. Slide heading drop-in on each new slide */
.slide.active .sh{animation:appDrop 0.3s cubic-bezier(0.22,1,0.36,1) both 0.04s}

/* 3. Step done — number swaps to ✓ with a pop */
.stp.done .stp-num-text{display:none}
.stp.done .stp-num::after{content:'✓'}
@keyframes tickPop{0%{transform:scale(0)}60%{transform:scale(1.4)}100%{transform:scale(1)}}
.stp.done .stp-num{animation:tickPop 0.25s cubic-bezier(0.34,1.56,0.64,1)}

/* 4. Time slot selected — crisp scale pop */
.tc.sel{transform:scale(1.06)!important}

/* 5. Service row press — more satisfying active state */
.svc-row:active{transform:scale(0.985) translateX(0)!important}

/* 6. Success screen — animated stripe across top */
@keyframes stripeScroll{from{background-position:0 0}to{background-position:32px 0}}
.succ{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.4s;overflow:hidden}
.succ::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 10px,var(--cut) 10px,var(--cut) 22px);
  background-size:32px 2px;
  animation:stripeScroll 0.5s linear infinite;
  opacity:0;transition:opacity 0.5s 0.35s;
}
.succ.show::before{opacity:0.55}

/* 7. Success mark — ring radiates outward */
@keyframes ringOut{
  0%{box-shadow:0 0 0 0 rgba(196,169,125,0.35)}
  70%{box-shadow:0 0 0 18px rgba(196,169,125,0)}
  100%{box-shadow:0 0 0 0 rgba(196,169,125,0)}
}
.succ.show .succ-mark{animation:ringOut 2s ease-out 0.7s infinite}

/* 8. Footer status cursor — blinks on the cut text color, not gold */
.fs.on::after{content:'_';margin-left:2px;animation:cur 1.1s step-end infinite;color:var(--cut);opacity:0.5}
@keyframes cur{0%,100%{opacity:0.5}50%{opacity:0}}

/* 9. Next button — alive press feel */
.bnx:not(:disabled):active{transform:scale(0.96)!important}

/* 10. Date chip selected — snap in */
.dc.sel{transform:scale(1.08)}
.dc{transition:all 0.15s cubic-bezier(0.34,1.4,0.64,1)}

/* ── TOAST ── */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:0.54rem;letter-spacing:0.1em;padding:10px 16px;z-index:9999;opacity:0;transition:all 0.2s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:#6b2020;color:#d07070}

/* ── LUCKY WHEEL ── */
.wheel-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);
  z-index:8000;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;opacity:0;pointer-events:none;transition:opacity 0.35s;
}
.wheel-overlay.show{opacity:1;pointer-events:all}
.wheel-header{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:1.1rem;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--dim);margin-bottom:4px;
}
.wheel-title{
  font-family:'Bebas Neue',sans-serif;font-size:3.2rem;letter-spacing:0.12em;
  color:var(--cut);line-height:1;margin-bottom:6px;text-align:center;
}
.wheel-sub{
  font-size:0.48rem;letter-spacing:0.18em;color:var(--dim);
  text-transform:uppercase;margin-bottom:24px;text-align:center;
}
.wheel-wrap{
  position:relative;width:280px;height:280px;flex-shrink:0;
}
.wheel-pointer{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:22px solid var(--cut);
  z-index:10;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
#spinCanvas{border-radius:50%;display:block;box-shadow:0 0 0 3px var(--border),0 0 0 4px var(--dim2),0 8px 32px rgba(0,0,0,0.6)}
.wheel-spin-btn{
  margin-top:20px;
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.2em;
  background:var(--cut);color:var(--bg);border:none;border-radius:4px;
  padding:14px 48px;cursor:pointer;transition:all 0.18s cubic-bezier(0.34,1.2,0.64,1);
  -webkit-user-select:none;user-select:none;
}
.wheel-spin-btn:active:not(:disabled){transform:scale(0.96)}
.wheel-spin-btn:disabled{background:var(--s2);color:var(--dim);cursor:not-allowed}

.wheel-result{
  margin-top:18px;text-align:center;
  opacity:0;transition:opacity 0.4s;
  min-height:60px;
}
.wheel-result.show{opacity:1}
.wheel-result-prize{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:1.8rem;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--gold);line-height:1;margin-bottom:4px;
}
.wheel-result-sub{font-size:0.5rem;letter-spacing:0.14em;color:var(--dim);text-transform:uppercase}
.wheel-close-btn{
  margin-top:14px;font-family:'DM Mono',monospace;font-size:0.52rem;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);
  background:none;border:1px solid var(--border);border-radius:4px;
  padding:10px 24px;cursor:pointer;
}
.wheel-close-btn:hover{color:var(--cream);border-color:var(--dim)}

</style>
</head>

<script>
const CFG={JSONBIN_BIN_ID:MOON_CONFIG.JSONBIN_BIN_ID,JSONBIN_API_KEY:MOON_CONFIG.JSONBIN_API_KEY,SMS_ENDPOINT:MOON_CONFIG.SMS_ENDPOINT};

// natural descriptions — sounds like a barbershop menu board
const DESC={
  fade:'Skin fade, low, mid or high.',
  cut:'Full cut, shaped and styled.',
  lineup:'Edge up, crisp lines.',
  beard:'Shape, trim and define.',
  shave:'Hot towel straight razor.',
  kids:'Clean cut for the young ones.',
};

let S={slide:1,svc:null,addons:[],date:null,time:null,payMethod:null,bookedSlots:{}};

// ── APPLY SETTINGS OBJECT → DOM ────────────────────────────
// Called once from localStorage (fast) then again after cloud fetch (accurate)
function applySettings(saved) {
  if (!saved || !Object.keys(saved).length) return;

  // merge into MOON_CONFIG
  if(saved.binId)    MOON_CONFIG.JSONBIN_BIN_ID  = saved.binId;
  if(saved.binKey)   MOON_CONFIG.JSONBIN_API_KEY  = saved.binKey;
  if(saved.sms)      MOON_CONFIG.SMS_ENDPOINT     = saved.sms;
  if(saved.shopName) MOON_CONFIG.SHOP_NAME        = saved.shopName;
  if(saved.phone)    MOON_CONFIG.SHOP_PHONE       = saved.phone;
  if(saved.cashapp)  MOON_CONFIG.CASHAPP          = saved.cashapp;
  if(saved.venmo)    MOON_CONFIG.VENMO            = saved.venmo;
  if(saved.paypal)   MOON_CONFIG.PAYPAL           = saved.paypal;
  if(saved.openHour  !== undefined) MOON_CONFIG.OPEN_HOUR  = saved.openHour;
  if(saved.closeHour !== undefined) MOON_CONFIG.CLOSE_HOUR = saved.closeHour;
  if(saved.welcome)  MOON_CONFIG.WELCOME          = saved.welcome;
  if(saved.cancelHours !== undefined) MOON_CONFIG.CANCEL_HOURS = saved.cancelHours;

  // theme
  const themes = {
    smoke:     { '--bg':'#090909','--s1':'#111111','--s2':'#181818','--text':'#f0ebe2','--cut':'#e2d9c8','--border':'#222','--dim':'#666' },
    noir:      { '--bg':'#000000','--s1':'#0d0d0d','--s2':'#141414','--text':'#ffffff','--cut':'#ffffff','--border':'#1a1a1a','--dim':'#555' },
    cobalt:    { '--bg':'#080c18','--s1':'#0d1220','--s2':'#121828','--text':'#e0e8f8','--cut':'#c8d8f8','--border':'#1a2238','--dim':'#4a5878' },
    forest:    { '--bg':'#090e0a','--s1':'#0f1a10','--s2':'#142016','--text':'#e8f0e8','--cut':'#d0e8d0','--border':'#1a2e1c','--dim':'#4a6a4c' },
    blush:     { '--bg':'#180d0d','--s1':'#221414','--s2':'#2a1818','--text':'#f5e6e6','--cut':'#f0d0d0','--border':'#3a2020','--dim':'#7a5050' },
    plum:      { '--bg':'#100a18','--s1':'#180f22','--s2':'#20142e','--text':'#ede0f8','--cut':'#d8c8f0','--border':'#2a1a3a','--dim':'#6a4a8a' },
    rose:      { '--bg':'#12080e','--s1':'#1c0e18','--s2':'#22111e','--text':'#f5e0ee','--cut':'#f0c8e0','--border':'#2e1428','--dim':'#7a4060' },
    slate:     { '--bg':'#0c0e10','--s1':'#141618','--s2':'#1a1e20','--text':'#e8eaec','--cut':'#d0d8e0','--border':'#222628','--dim':'#5a6268' },
    white:     { '--bg':'#ffffff','--s1':'#f8f8f8','--s2':'#f0f0f0','--text':'#111111','--cut':'#111111','--border':'#e0e0e0','--dim':'#999' },
    pearl:     { '--bg':'#faf8f5','--s1':'#f2ede6','--s2':'#e8e2d8','--text':'#1a1814','--cut':'#111110','--border':'#ddd5c8','--dim':'#9a8878' },
    petal:     { '--bg':'#fdf5f7','--s1':'#f8ecf0','--s2':'#f0e0e8','--text':'#2a1420','--cut':'#c4607a','--border':'#e8cece','--dim':'#b08090' },
    lavender:  { '--bg':'#f6f4fc','--s1':'#edeaf8','--s2':'#e4e0f4','--text':'#1a1430','--cut':'#7c60c4','--border':'#d4cef0','--dim':'#9080b8' },
    sage:      { '--bg':'#f4f8f4','--s1':'#e8f0e8','--s2':'#dce8dc','--text':'#142014','--cut':'#5a9460','--border':'#cce0cc','--dim':'#7a9a7c' },
    linen:     { '--bg':'#f5f0e8','--s1':'#ede8de','--s2':'#e5e0d4','--text':'#1a1a18','--cut':'#111110','--border':'#d8d0c0','--dim':'#9a9080' },
    cloud:     { '--bg':'#f4f7fc','--s1':'#eaf0f8','--s2':'#dce8f4','--text':'#101828','--cut':'#4a80c4','--border':'#ccdaee','--dim':'#7090b8' },
    mauve:     { '--bg':'#f8f4f6','--s1':'#f0e8ec','--s2':'#e8dce4','--text':'#28141e','--cut':'#b06080','--border':'#e0ccd6','--dim':'#a08090' },
    
  };
  const t = themes[saved.bgTheme] || themes.smoke;
  Object.entries(t).forEach(([k,v]) => document.documentElement.style.setProperty(k, v));

  // accent color
  if(saved.accent) {
    document.documentElement.style.setProperty('--gold',  saved.accent);
    document.documentElement.style.setProperty('--gold2', saved.accent);
  }

  // font
  const fontUrls = {
    barlow:'https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap',
    playfair:'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap',
    cormorant:'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap',
    josefin:'https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap',
    dm:'https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap',
    nunito:'https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap',
    raleway:'https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap',
    italiana:'https://fonts.googleapis.com/css2?family=Italiana&display=swap',
  };
  const fontFamilies = {
    barlow:"'Barlow Condensed',sans-serif", playfair:"'Playfair Display',serif",
    cormorant:"'Cormorant Garamond',serif", josefin:"'Josefin Sans',sans-serif",
    dm:"'DM Serif Display',serif", nunito:"'Nunito',sans-serif",
    raleway:"'Raleway',sans-serif", italiana:"'Italiana',serif",
  };
  if(saved.fontId && fontUrls[saved.fontId]) {
    const l = document.createElement('link');
    l.rel='stylesheet'; l.href=fontUrls[saved.fontId];
    document.head.appendChild(l);
    document.documentElement.style.setProperty('--font-display', fontFamilies[saved.fontId]);
  }

  // services
  if(saved._services && saved._services.length) {
    SERVICES.length = 0;
    saved._services.forEach(s => SERVICES.push(s));
  }

  // work days & hours
  if(saved._workDays) MOON_CONFIG.WORK_DAYS = saved._workDays;
  if(saved._dayHours) localStorage.setItem('moonDayHours', JSON.stringify(saved._dayHours));
  if(saved._blocks){
    localStorage.setItem('moonBlocks', JSON.stringify(saved._blocks));
    // also keep moonCfg in sync so renderTimes() finds blocks either way
    const cfg = JSON.parse(localStorage.getItem('moonCfg') || '{}');
    cfg._blocks = saved._blocks;
    localStorage.setItem('moonCfg', JSON.stringify(cfg));
  }
  // rebuild TIMES — read from saved settings first, fall back to config.js
  const open    = saved.openHour  || MOON_CONFIG.OPEN_HOUR  || 9;
  const close   = saved.closeHour || MOON_CONFIG.CLOSE_HOUR || 18;
  const slotLen = saved.slotLen   || MOON_CONFIG.SLOT_LEN   || 30;
  // keep MOON_CONFIG in sync so any legacy code reading it stays correct
  MOON_CONFIG.OPEN_HOUR  = open;
  MOON_CONFIG.CLOSE_HOUR = close;
  MOON_CONFIG.SLOT_LEN   = slotLen;
  TIMES.length = 0;
  for(let mins = open*60; mins < close*60; mins += slotLen){
    const h=Math.floor(mins/60), m=mins%60, ap=h<12?'AM':'PM', h12=h===0?12:h>12?h-12:h;
    TIMES.push(`${h12}:${m.toString().padStart(2,'0')} ${ap}`);
  }

  // shop name + tagline
  if(MOON_CONFIG.SHOP_NAME) {
    const logo = document.querySelector('.logo');
    if(logo) logo.textContent = MOON_CONFIG.SHOP_NAME;
    document.title = MOON_CONFIG.SHOP_NAME + ' — Book';
  }
  if(MOON_CONFIG.WELCOME) document.querySelector('.tagline').textContent = MOON_CONFIG.WELCOME;

// ── CACHED RECORD — fetched once on load, reused on save ──
let _cachedRecord = null;

async function loadBookings(){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG.JSONBIN_BIN_ID}/latest`,{headers:{'X-Master-Key':CFG.JSONBIN_API_KEY}});
    if(!r.ok)return;
    const{record}=await r.json();
    _cachedRecord = record;
    S.bookedSlots={};
    (record.bookings||[]).filter(b=>b.status!=='cancelled').forEach(b=>{if(!S.bookedSlots[b.date])S.bookedSlots[b.date]=[];S.bookedSlots[b.date].push(b.time);});
    if(record.settings){
      if(record.settings._blocks)   localStorage.setItem('moonBlocks',   JSON.stringify(record.settings._blocks));
      if(record.settings._dayHours) localStorage.setItem('moonDayHours', JSON.stringify(record.settings._dayHours));
      if(record.settings._workDays) MOON_CONFIG.WORK_DAYS = record.settings._workDays;
    }
  }catch(e){}
}

async function saveBooking(bk){
  // Use cached record from page load — skips a GET call, making booking ~2x faster
  // Falls back to fresh GET only if cache is gone (very long session)
  let record = _cachedRecord;
  if(!record){
    const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG.JSONBIN_BIN_ID}/latest`,{headers:{'X-Master-Key':CFG.JSONBIN_API_KEY}});
    if(!r.ok) throw new Error('Could not reach booking system: '+r.status);
    const j=await r.json();
    record = j.record||{};
  }
  if(!record.bookings) record.bookings=[];
  if(!record.clients)  record.clients=[];
  record.bookings.push(bk);
  const c=record.clients.find(x=>x.phone===bk.phone);
  if(c){c.visits++;c.lastVisit=bk.date;}
  else record.clients.push({name:bk.name,phone:bk.phone,visits:1,lastVisit:bk.date,joinDate:new Date().toISOString().split('T')[0]});
  const w=await fetch(`https://api.jsonbin.io/v3/b/${CFG.JSONBIN_BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':CFG.JSONBIN_API_KEY},body:JSON.stringify(record)});
  if(!w.ok) throw new Error('Failed to save booking: '+w.status);
  _cachedRecord = record; // keep cache fresh for next booking in same session
}

function renderDates(){
  const today = new Date();
  const nowMins = today.getHours()*60 + today.getMinutes();
  const todayStr = dStr(today);
  let html = '';
  const workDays = MOON_CONFIG.WORK_DAYS || [1,2,3,4,5,6];
  const saved = JSON.parse(localStorage.getItem('moonCfg') || '{}');
  const blocks = saved._blocks || JSON.parse(localStorage.getItem('moonBlocks') || '[]');
  const dayHours = saved._dayHours || JSON.parse(localStorage.getItem('moonDayHours') || '{}');
  const slotStep = saved.slotLen || MOON_CONFIG.SLOT_LEN || 30;

  for(let i = 0; i < 21; i++){
    const d = new Date(today); d.setDate(today.getDate()+i);
    const dow = d.getDay();
    if(!workDays.includes(dow)) continue;
    const ds = dStr(d);
    if(blocks.some(b => b.date===ds && !b.from && !b.to)) continue;

    // for today: check if any slots remain (with 30min buffer)
    if(ds === todayStr){
      const dh = dayHours[dow];
      const open  = dh ? dh.open  : (saved.openHour  || MOON_CONFIG.OPEN_HOUR  || 9);
      const close = dh ? dh.close : (saved.closeHour || MOON_CONFIG.CLOSE_HOUR || 18);
      const lastSlotMins = close*60 - slotStep;
      if(nowMins + 30 >= lastSlotMins) continue; // no usable slots left today
    }

    const lbl = i===0 ? 'Today' : d.toLocaleDateString('en-US',{weekday:'short'});
    html += `<div class="dc ${S.date===ds?'sel':''}" onclick="pickDate('${ds}')"><span class="dc-d">${lbl}</span><span class="dc-n">${d.getDate()}</span></div>`;
  }
  document.getElementById('dateStrip').innerHTML = html || '<div style="color:var(--dim);font-size:12px;padding:8px">No available dates</div>';
}

function renderTimes(){
  const taken = S.bookedSlots[S.date] || [];
  const lbl = S.date ? new Date(S.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}) : 'Time';
  document.getElementById('timeLabel').textContent = lbl;

  // get per-day hours if set, else fall back to global
  const _cfg = JSON.parse(localStorage.getItem('moonCfg') || '{}');
  let open  = _cfg.openHour  || MOON_CONFIG.OPEN_HOUR  || 9;
  let close = _cfg.closeHour || MOON_CONFIG.CLOSE_HOUR || 18;
  if (S.date) {
    const dow = new Date(S.date+'T12:00:00').getDay();
    const dayHours = _cfg._dayHours || JSON.parse(localStorage.getItem('moonDayHours') || '{}');
    if (dayHours[dow]) { open = dayHours[dow].open; close = dayHours[dow].close; }
  }

  // build times for this specific day — use saved slot length, not config.js default
  const step = _cfg.slotLen || MOON_CONFIG.SLOT_LEN || 30;
  const slots = [];
  for (let mins = open*60; mins < close*60; mins += step) {
    const h = Math.floor(mins/60), m = mins%60;
    const ap = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    slots.push(`${h12}:${m.toString().padStart(2,'0')} ${ap}`);
  }

  // filter past slots if today (+ 30min buffer so barber has time to prep)
  const todayStr = dStr(new Date());
  const nowMins  = S.date === todayStr ? new Date().getHours()*60 + new Date().getMinutes() + 30 : -1;
  const visible  = slots.filter(t => {
    if (nowMins < 0) return true;
    const [time, ap] = t.split(' ');
    const [hh, mm]   = time.split(':').map(Number);
    const h24 = ap === 'AM' ? (hh === 12 ? 0 : hh) : (hh === 12 ? 12 : hh + 12);
    return h24 * 60 + mm > nowMins;
  });

 const saved = JSON.parse(localStorage.getItem('moonCfg') || '{}');
  const blocks = saved._blocks || [];
  const dayBlocks = blocks.filter(b => b.date === S.date);

  document.getElementById('timeGrid').innerHTML = visible.map(t => {
    const isTaken = taken.includes(t);
    const isBlocked = dayBlocks.some(b => {
      if (b.fullDay) return true;
      const fi = visible.indexOf(b.from), ti = visible.indexOf(b.to), si = visible.indexOf(t);
      if (fi === -1 || ti === -1 || si === -1) return false;
      return si >= fi && si < ti;
    });
    const disabled = isTaken || isBlocked;
    return `<div class="tc ${disabled?'taken':''} ${S.time===t?'sel':''}" onclick="${disabled?'':` pickTime('${t}')`}">${t}</div>`;
  }).join('') || '<div style="color:var(--dim);font-size:12px;padding:8px 0;letter-spacing:0.08em">No more slots today</div>';
}

// slide order map: logical step number → slide element id
const SLIDE_IDS = ['slide1','slide1b','slide2','slide3','slide4'];

function nextSlide(){
  if(S.slide===1){if(!S.svc){toast('Pick a service',true);return;}renderAddons();goTo(2);}
  else if(S.slide===2){goTo(3);} // add-ons always skippable
  else if(S.slide===3){if(!S.date||!S.time){toast('Pick a date and time',true);return;}goTo(4);}
  else if(S.slide===4){
    const n=document.getElementById('nameInput').value.trim();
    const p=document.getElementById('phoneInput').value.trim();
    if(!n){toast("What's your name?",true);return;}
    if(!p||p.replace(/\D/g,'').length<10){toast('Need your phone number',true);return;}
    renderConfirm();goTo(5);
  }else if(S.slide===5){confirmBooking();}
}

function prevSlide(){if(S.slide>1)goTo(S.slide-1);}

function goTo(n){
  const prevId = SLIDE_IDS[S.slide-1];
  const prev = document.getElementById(prevId);
  if(prev){prev.classList.remove('active');prev.classList.add('exit');setTimeout(()=>prev.classList.remove('exit'),320);}
  S.slide=n;
  const nextId = SLIDE_IDS[n-1];
  const next = document.getElementById(nextId);
  if(next){next.style.transform='translateX(24px)';requestAnimationFrame(()=>requestAnimationFrame(()=>{next.classList.add('active');next.style.transform='';}));}
  ['st1','st2','st3','st4','st5'].forEach((id,i)=>{
    const el=document.getElementById(id);if(!el)return;
    el.className='stp'+(i+1<n?' done':i+1===n?' active':'');
  });
  document.getElementById('btnBack').className='bbk'+(n>1?'':' hidden');
  updateFooter();
}

function updateFooter(){
  const btn=document.getElementById('btnNext');
  const st=document.getElementById('fStatus');
  const set=(t,on,lbl)=>{btn.querySelector('.bt').textContent=t;btn.disabled=!on;};
  if(S.slide===1){set('Next →',!!S.svc);st.textContent=S.svc?`${S.svc.name} · ${S.svc.price} · ${S.svc.dur}`:'Select a service';st.className='fs'+(S.svc?' on':'');}
  else if(S.slide===2){
    const cnt=S.addons.length;
    set(cnt?`Continue with ${cnt} add-on${cnt>1?'s':''}  →`:'Skip Add-Ons →',true);
    const cfg=JSON.parse(localStorage.getItem('moonCfg')||'{}');
    const allAddons=cfg._addons||[];
    const names=S.addons.map(id=>{const a=allAddons.find(x=>x.id===id);return a?a.name:id;}).join(', ');
    st.textContent=cnt?`+ ${names}`:'Optional — skip or select extras';
    st.className='fs'+(cnt?' on':'');
  }
  else if(S.slide===3){const ok=S.date&&S.time;set('Next →',!!ok);const dl=S.date?new Date(S.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}):'';st.textContent=ok?`${dl} · ${S.time}`:S.date?'Now pick a time':'Pick a day first';st.className='fs'+(ok?' on':'');}
  else if(S.slide===4){const n=document.getElementById('nameInput')?.value.trim();const p=document.getElementById('phoneInput')?.value.trim();const ok=n&&p&&p.replace(/\D/g,'').length>=10;set('Review →',!!ok);st.textContent=ok?'Looking good':'Fill in your details';st.className='fs'+(ok?' on':'');}
  else if(S.slide===5){set('Confirm Booking',true);st.textContent='2-hour cancellation policy';st.className='fs on';}
}

function applyVacationMode() {
  const cfg = JSON.parse(localStorage.getItem('moonCfg') || '{}');

function buildSMS(name, svc, dl, time, payLabel) {
  const cfg = JSON.parse(localStorage.getItem('moonCfg') || '{}');
  const shopName = cfg.shopName || MOON_CONFIG.SHOP_NAME || 'Your Barber';
  const cancelHrs = cfg.cancelHours || MOON_CONFIG.CANCEL_HOURS || 2;

  if (cfg.customSms) {
    // replace placeholders barber set in their custom SMS
    return cfg.customSms
      .replace('{name}',    name)
      .replace('{service}', svc)
      .replace('{date}',    dl)
      .replace('{time}',    time)
      .replace('{payment}', payLabel)
      .replace('{shop}',    shopName);
  }

  return `${shopName} — You're booked!

${svc} · ${dl} at ${time}
Payment: ${payLabel}

Reply CANCEL to cancel (${cancelHrs}hr notice). See you.`;
}

// ── LUCKY SPIN WHEEL ─────────────────────────────────────
const DEFAULT_WHEEL_PRIZES = [
  { label: '$5 Off',        weight: 30, color: '#2a2218', textColor: '#c4a97d' },
  { label: 'Free Design',   weight:  8, color: '#1a1008', textColor: '#e8d080' },
  { label: 'Free Add-On',   weight: 22, color: '#1c1a12', textColor: '#d0c898' },
  { label: 'Free Eyebrows', weight: 14, color: '#141210', textColor: '#a8c8a0' },
  { label: '$10 Off',       weight: 10, color: '#120e08', textColor: '#d4a060' },
  { label: 'Free Beard',    weight: 16, color: '#181410', textColor: '#c0b890' },
];

// Returns active prizes from cloud settings or defaults
function getWheelPrizes() {
  const cfg = JSON.parse(localStorage.getItem('moonCfg') || '{}');
  const saved = cfg._wheelPrizes;
  if (saved && saved.length) {
    return saved.filter(p => p.active !== false).map(p => ({
      label: p.label,
      weight: p.weight,
      color: p.color || '#1a1a1a',
      textColor: '#e0d8c8',
    }));
  }
  return DEFAULT_WHEEL_PRIZES;
}

let WHEEL_PRIZES = DEFAULT_WHEEL_PRIZES;

function pickWeightedPrize() {
  const total = WHEEL_PRIZES.reduce((a, p) => a + p.weight, 0);
  let r = Math.random() * total;
  for (const p of WHEEL_PRIZES) { r -= p.weight; if (r <= 0) return p; }
  return WHEEL_PRIZES[0];
}

let _wheelSpinning = false;
let _wheelAngle    = 0;
let _wheelPrize    = null;

function drawWheel(angle) {
  const canvas = document.getElementById('spinCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 140, cy = 140, r = 136;
  const n = WHEEL_PRIZES.length;
  const arc = (2 * Math.PI) / n;
  ctx.clearRect(0, 0, 280, 280);
  WHEEL_PRIZES.forEach((prize, i) => {
    const start = angle + i * arc;
    const end   = start + arc;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = prize.color;
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = prize.textColor;
    ctx.font = "bold 12px 'Barlow Condensed', sans-serif";
    ctx.fillText(prize.label.toUpperCase(), r - 12, 4);
    ctx.restore();
  });
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
  ctx.fillStyle = '#0d0d0d';
  ctx.fill();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
  ctx.fillStyle = '#c4a97d';
  ctx.fill();
}

function spinWheel() {
  if (_wheelSpinning) return;
  _wheelSpinning = true;
  document.getElementById('wheelSpinBtn').disabled = true;
  document.getElementById('wheelResult').classList.remove('show');
  _wheelPrize = pickWeightedPrize();
  const prizeIndex = WHEEL_PRIZES.indexOf(_wheelPrize);
  const n = WHEEL_PRIZES.length;
  const arc = (2 * Math.PI) / n;
  const spins = 5 + Math.random() * 3;
  const sliceMid = prizeIndex * arc + arc / 2;
  const targetAngle = (spins * 2 * Math.PI) + (-Math.PI / 2 - sliceMid - (_wheelAngle % (2 * Math.PI)));
  const duration = 4400;
  const start = performance.now();
  const startAngle = _wheelAngle;
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    _wheelAngle = startAngle + targetAngle * easeOut(t);
    drawWheel(_wheelAngle);
    if (t < 1) { requestAnimationFrame(frame); }
    else { _wheelSpinning = false; showWheelResult(); }
  }
  requestAnimationFrame(frame);
}

function showWheelResult() {
  document.getElementById('wheelPrizeName').textContent = _wheelPrize.label + ' 🎉';
  document.getElementById('wheelResult').classList.add('show');
  document.getElementById('wheelCloseBtn').style.display = 'block';
  savePrizeToRecord(_wheelPrize.label);
}

async function savePrizeToRecord(prizeLabel) {
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${CFG.JSONBIN_BIN_ID}/latest`, { headers: { 'X-Master-Key': CFG.JSONBIN_API_KEY } });
    if (!r.ok) return;
    const { record } = await r.json();
    if (!record.clients) return;
    const rawPhone = document.getElementById('phoneInput').value.replace(/\D/g, '');
    const phone = '+1' + rawPhone;
    const c = record.clients.find(x => x.phone === phone);
    if (c) {
      if (!c.prizes) c.prizes = [];
      c.prizes.push({ prize: prizeLabel, date: new Date().toISOString().split('T')[0], redeemed: false });
      await fetch(`https://api.jsonbin.io/v3/b/${CFG.JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': CFG.JSONBIN_API_KEY },
        body: JSON.stringify(record)
      });
    }
  } catch(e) {}
}

function closeWheel() {
  document.getElementById('wheelOverlay').classList.remove('show');
}

function maybeShowWheel() {
  const cfg = JSON.parse(localStorage.getItem('moonCfg') || '{}');
  if (cfg.wheelEnabled === false) return;
  const odds = cfg.wheelOdds || 6;
  if (Math.random() < 1 / odds) {
    WHEEL_PRIZES = getWheelPrizes();
    if (!WHEEL_PRIZES.length) return;
    _wheelAngle = 0;
    _wheelSpinning = false;
    drawWheel(0);
    document.getElementById('wheelSpinBtn').disabled = false;
    document.getElementById('wheelResult').classList.remove('show');
    document.getElementById('wheelCloseBtn').style.display = 'none';
    setTimeout(() => document.getElementById('wheelOverlay').classList.add('show'), 1500);
  }
}

function copyToClipboard(text) {
  navigator.clipboard?.writeText(text)
    .then(() => toast('Link copied! 📋'))
    .catch(() => toast('Copy the URL from your browser'));
}
function formatPhone(el){
  let v = el.value.replace(/\D/g,'').slice(0,10);
  if(v.length >= 7) v = '('+v.slice(0,3)+') '+v.slice(3,6)+'-'+v.slice(6);
  else if(v.length >= 4) v = '('+v.slice(0,3)+') '+v.slice(3);
  else if(v.length) v = '('+v;
  el.value = v;
}
function renderSuccessPayments() {
  const cfg = JSON.parse(localStorage.getItem('moonCfg') || '{}');
  const cashapp = cfg.cashapp || MOON_CONFIG.CASHAPP || '';
  const venmo   = cfg.venmo   || MOON_CONFIG.VENMO   || '';
  const paypal  = cfg.paypal  || MOON_CONFIG.PAYPAL  || '';
  const zelle   = cfg.zelle   || MOON_CONFIG.ZELLE   || '';

  const svc     = S.svc;
  const amt     = svc?.priceNum || (svc?.price || '').replace(/\D/g,'');
  const note    = encodeURIComponent(`${cfg.shopName || 'Barber'} - ${svc?.name || 'Cut'}`);

  let html = `<div style="font-size:0.44rem;letter-spacing:0.22em;color:var(--dim);text-transform:uppercase;margin-bottom:10px;text-align:left">Payment</div>`;

  // always show cash
  html += `<div style="display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:13px 16px;margin-bottom:7px">
    <span style="font-size:1.2rem">💵</span>
    <div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--cut)">Cash at the shop</div>
      <div style="font-size:0.46rem;letter-spacing:0.08em;color:var(--dim)">Pay when you arrive — no need to do anything now</div>
    </div>
  </div>`;

  if (cashapp) {
    const url = `https://cash.app/${cashapp}/${amt}`;
    html += payBtn('💲', 'CashApp', cashapp, url, '#00d632');
  }
  if (venmo) {
    const url = `https://venmo.com/${venmo.replace('@','')}?txn=pay&amount=${amt}&note=${note}`;
    html += payBtn('💙', 'Venmo', venmo, url, '#3d95ce');
  }
  if (paypal) {
    const url = `https://paypal.me/${paypal}/${amt}`;
    html += payBtn('🅿️', 'PayPal', `paypal.me/${paypal}`, url, '#0070ba');
  }
  if (zelle) {
    html += payBtn('🟡', 'Zelle', zelle, null, '#6d1ed4');
  }

  document.getElementById('paymentMethods').innerHTML = html;
}

function payBtn(icon, name, handle, url, color) {
  const inner = url
    ? `<a href="${url}" target="_blank" style="margin-left:auto;background:${color};color:#fff;border-radius:3px;padding:6px 14px;font-size:0.46rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;white-space:nowrap;flex-shrink:0">Pay Now</a>`
    : `<span style="margin-left:auto;font-size:0.46rem;letter-spacing:0.08em;color:var(--dim)">${handle}</span>`;
  return `<div style="display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:13px 16px;margin-bottom:7px">
    <span style="font-size:1.2rem">${icon}</span>
    <div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--cut)">${name}</div>
      <div style="font-size:0.46rem;letter-spacing:0.08em;color:var(--dim)">${handle}</div>
    </div>
    ${inner}
  </div>`;
}

function closeBooking() {
  // just reset back to step 1 cleanly
  resetBooking();
}
function dStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2600);}
